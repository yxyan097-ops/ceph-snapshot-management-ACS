<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Ceph 快照管理</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .login-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-md);
        }
        .login-card h1 {
            text-align: center;
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--text);
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: var(--teal-hover); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: var(--rose);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Ceph 快照管理</h1>
        <p class="subtitle">请登录以继续</p>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" id="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登录</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errEl.textContent = '请输入用户名和密码';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            errEl.style.display = 'none';

            fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || '登录失败';
                    errEl.style.display = 'block';
                }
            })
            .catch(err => {
                errEl.textContent = '网络错误: ' + err.message;
                errEl.style.display = 'block';
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '登录';
            });
        };
    </script>
</body>
</html>
