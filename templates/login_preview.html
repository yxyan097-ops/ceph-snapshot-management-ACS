<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Ceph 快照管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h1>Ceph 快照管理</h1>
        <p class="subtitle">Snapshot Management System</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="输入密码">
            </div>
            <div class="form-group">
                <button type="submit" class="btn-primary">登 录</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>
</body>
</html>
